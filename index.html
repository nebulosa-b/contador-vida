<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Life Counter</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0a0a0a;
      color: #e8e8e8;
      font-family: Georgia, 'Times New Roman', serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }

    /* --- SETUP SCREEN --- */
    #setup {
      text-align: center;
      max-width: 400px;
    }

    #setup h1 {
      font-size: 1.8rem;
      font-weight: normal;
      letter-spacing: 0.05em;
      margin-bottom: 0.5rem;
      color: #e8e8e8;
    }

    #setup p {
      font-size: 0.85rem;
      color: #555;
      margin-bottom: 2.5rem;
      line-height: 1.6;
      font-family: system-ui, sans-serif;
    }

    #setup input[type="date"] {
      background: #111;
      border: 1px solid #2a2a2a;
      color: #e8e8e8;
      padding: 0.75rem 1.25rem;
      font-size: 1rem;
      border-radius: 6px;
      width: 100%;
      margin-bottom: 1rem;
      font-family: system-ui, sans-serif;
      cursor: pointer;
    }

    #setup input[type="date"]:focus {
      outline: none;
      border-color: #c8a96e;
    }

    #setup button {
      background: #c8a96e;
      color: #0a0a0a;
      border: none;
      padding: 0.75rem 2.5rem;
      font-size: 0.9rem;
      border-radius: 6px;
      cursor: pointer;
      font-family: system-ui, sans-serif;
      font-weight: 600;
      letter-spacing: 0.05em;
      transition: background 0.2s;
      width: 100%;
    }

    #setup button:hover { background: #d4b87a; }

    /* --- MAIN SCREEN --- */
    #main { display: none; width: 100%; max-width: 960px; }

    /* Stats */
    .stats {
      display: flex;
      justify-content: center;
      gap: 3rem;
      margin-bottom: 2.5rem;
      flex-wrap: wrap;
    }

    .stat {
      text-align: center;
    }

    .stat-value {
      font-size: 2rem;
      font-weight: normal;
      color: #e8e8e8;
      line-height: 1;
      margin-bottom: 0.3rem;
    }

    .stat-value.gold { color: #c8a96e; }

    .stat-label {
      font-size: 0.7rem;
      color: #444;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      font-family: system-ui, sans-serif;
    }

    /* Progress bar */
    .progress-wrap {
      margin-bottom: 2.5rem;
      text-align: center;
    }

    .progress-bar-bg {
      background: #1a1a1a;
      border-radius: 2px;
      height: 3px;
      width: 100%;
      overflow: hidden;
      margin-bottom: 0.5rem;
    }

    .progress-bar-fill {
      height: 100%;
      background: #c8a96e;
      border-radius: 2px;
      transition: width 1s ease;
    }

    .progress-label {
      font-size: 0.75rem;
      color: #333;
      font-family: system-ui, sans-serif;
      letter-spacing: 0.08em;
    }

    /* Grid */
    .grid-container {
      display: flex;
      flex-wrap: wrap;
      gap: 3px;
      justify-content: center;
      margin-bottom: 2rem;
    }

    .week {
      width: 8px;
      height: 8px;
      border-radius: 1px;
      background: #1e1e1e;
      transition: background 0.3s;
    }

    .week.lived { background: #e8e8e8; }

    .week.current {
      background: #c8a96e;
      border-radius: 2px;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.6; transform: scale(1.3); }
    }

    /* Reset button */
    .reset-btn {
      display: block;
      margin: 0 auto;
      background: none;
      border: none;
      color: #2a2a2a;
      font-size: 0.7rem;
      cursor: pointer;
      font-family: system-ui, sans-serif;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      transition: color 0.2s;
      padding: 0.5rem;
    }

    .reset-btn:hover { color: #555; }

    @media (max-width: 600px) {
      .week { width: 6px; height: 6px; gap: 2px; }
      .stats { gap: 1.5rem; }
      .stat-value { font-size: 1.5rem; }
    }
  </style>
</head>
<body>

  <!-- Setup -->
  <div id="setup">
    <h1>¿Cuánto te queda?</h1>
    <p>Introduce tu fecha de nacimiento para ver tu vida representada en semanas.</p>
    <input type="date" id="dob-input" />
    <button onclick="start()">Ver mi vida</button>
  </div>

  <!-- Main -->
  <div id="main">
    <div class="stats">
      <div class="stat">
        <div class="stat-value gold" id="stat-weeks-lived">—</div>
        <div class="stat-label">Semanas vividas</div>
      </div>
      <div class="stat">
        <div class="stat-value" id="stat-weeks-left">—</div>
        <div class="stat-label">Semanas restantes</div>
      </div>
      <div class="stat">
        <div class="stat-value" id="stat-years">—</div>
        <div class="stat-label">Años</div>
      </div>
      <div class="stat">
        <div class="stat-value gold" id="stat-percent">—</div>
        <div class="stat-label">Vida transcurrida</div>
      </div>
    </div>

    <div class="progress-wrap">
      <div class="progress-bar-bg">
        <div class="progress-bar-fill" id="progress-fill" style="width:0%"></div>
      </div>
      <div class="progress-label" id="progress-label"></div>
    </div>

    <div class="grid-container" id="grid"></div>

    <button class="reset-btn" onclick="reset()">cambiar fecha</button>
  </div>

  <script>
    const TOTAL_YEARS = 90;
    const TOTAL_WEEKS = TOTAL_YEARS * 52;

    function getWeeksLived(dob) {
      const now = new Date();
      const diff = now - dob;
      return Math.floor(diff / (1000 * 60 * 60 * 24 * 7));
    }

    function render(dob) {
      const weeksLived = getWeeksLived(dob);
      const weeksLeft = Math.max(0, TOTAL_WEEKS - weeksLived);
      const percent = Math.min(100, (weeksLived / TOTAL_WEEKS) * 100);
      const years = (weeksLived / 52).toFixed(1);

      document.getElementById('stat-weeks-lived').textContent = weeksLived.toLocaleString();
      document.getElementById('stat-weeks-left').textContent = weeksLeft.toLocaleString();
      document.getElementById('stat-years').textContent = years;
      document.getElementById('stat-percent').textContent = percent.toFixed(1) + '%';
      document.getElementById('progress-fill').style.width = percent + '%';
      document.getElementById('progress-label').textContent =
        weeksLived.toLocaleString() + ' de ' + TOTAL_WEEKS.toLocaleString() + ' semanas';

      const grid = document.getElementById('grid');
      grid.innerHTML = '';

      for (let i = 0; i < TOTAL_WEEKS; i++) {
        const dot = document.createElement('div');
        dot.className = 'week';
        if (i < weeksLived) dot.classList.add('lived');
        if (i === weeksLived) dot.classList.add('current');
        grid.appendChild(dot);
      }
    }

    function start() {
      const val = document.getElementById('dob-input').value;
      if (!val) return;
      localStorage.setItem('life-dob', val);
      show(val);
    }

    function show(val) {
      const dob = new Date(val);
      document.getElementById('setup').style.display = 'none';
      document.getElementById('main').style.display = 'block';
      render(dob);
      setInterval(() => render(dob), 60000);
    }

    function reset() {
      localStorage.removeItem('life-dob');
      document.getElementById('setup').style.display = 'flex';
      document.getElementById('setup').style.flexDirection = 'column';
      document.getElementById('main').style.display = 'none';
    }

    // Auto-load if saved
    const saved = localStorage.getItem('life-dob');
    if (saved) show(saved);
  </script>

</body>
</html>
